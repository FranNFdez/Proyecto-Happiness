<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contacto - Happiness&Co</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="assets/css/styles.css">
    </head>

    <body class="bg-gray-100 flex flex-col min-h-screen">

        <!--Header-->
        <header class="bg-white text-white p-4 flex items-center gap-4">
            <img src="assets/img/logo/logo_happiness_gris.jpg" class="h-10">
       </header>

        <!--Navegacion-->
        <nav class="bg-gray-800 text-white p-3">
            <ul class="flex gap-4">
                <li><a href="index.html" class="hover:underline">Inicio</a></li>
                <li><a href="eventos.html" class="hover:underline">Eventos</a></li>
                <li><a href="historial.html" class="hover:underline">Historial</a></li>
                <li><a href="sobre-nosotros.html" class="hover:underline">Sobre nosotros</a></li>
                <li><a href="fuentes.html" class="hover:underline">Fuentes</a></li>
                <li><a href="contacto.html" class="hover:underline">Contacto</a></li>
            </ul>
        </nav>

        <!--Contenido-->
        <main class="flex flex-grow">

            <!--ContenidoPrincipal-->
            <section class="w-3/4 p-6">

                <h2 class="text-2xl font-bold mb-6">Contacto</h2>

                <!--Formulario-->
                <form class="bg-white p-6 rounded shadow max-w-lg">

                    <!--Nombre-->
                    <label class="block mb-2 font-semibold">Nombre</label>
                    <input type="text" class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#ba007c]" placeholder="Tu nombre" required>

                    <!--Apellidos-->
                    <label class="block mb-2 font-semibold">Apellidos</label>
                    <input type="text" class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#ba007c]" placeholder="Tus apellidos" required>

                    <!--Email-->
                    <label class="block mb-2 font-semibold">Email</label>
                    <input type="email" class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#ba007c]" placeholder="ejemplo@email.com" required>

                    <!--Telefono-->
                    <label class="block mb-2 font-semibold">Teléfono</label>
                    <input type="tel" class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#ba007c]" placeholder="666 999 666">

                    <!--Comentario-->
                    <label class="block mb-2 font-semibold">Comentario</label>
                    <textarea class="w-full mb-4 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#ba007c]" rows="4" placeholder="Escribe tu mensaje"></textarea>

                    <!--Checkbox-->
                    <div class="mb-4 flex items-center gap-2">
                        <input type="checkbox">
                        <label>Acepto recibir información sobre eventos</label>
                    </div>

                    <!--Boton-->
                    <button class="bg-[#ba007c] text-white px-4 py-2 rounded shadow hover:bg-pink-700 transition">
                        Enviar
                    </button>

                </form>

            </section>

            <!--Lateral-->
            <aside class="w-1/4 p-6 bg-gray-200">

                <h2 class="font-bold mb-4">Recomendados</h2>

                <!--Recomendado1-->
                <a href="evento_futuro3.html" class="block mb-4">
                    <div class="bg-white p-3 shadow hover:shadow-lg transition rounded">

                        <img src="assets/img/eventos/SecretBattle2026banner.png" class="w-full h-24 object-cover mb-2 rounded">

                        <p class="text-sm text-gray-500">25/06/2026</p>
                        <p class="font-bold">Secret Battle 2026</p>

                    </div>
                </a>

                <!--Recomendado2-->
                <a href="evento_futuro6.html" class="block">
                    <div class="bg-white p-3 shadow hover:shadow-lg transition rounded">

                        <img src="assets/img/eventos/ElGochu.png" class="w-full h-24 object-cover mb-2 rounded">

                        <p class="text-sm text-gray-500">16/09/2026</p>
                        <p class="font-bold">Gochu Skate Contest</p>

                    </div>
                </a>

            </aside>

        </main>

        <!--Footer-->
        <footer class="bg-gray-800 text-white p-4 text-center mt-auto">
            <a href="rss.xml" class="text-blue-400">RSS</a>
            <p>&copy; 2026 Happiness&Co</p>
        </footer>

    </body>
</html>
